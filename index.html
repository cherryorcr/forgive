<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝宝可以原谅我嘛</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #ffe6f0;
            font-family: "Microsoft YaHei";
            text-align: center;
        }

        h1 {
            margin-top: 20vh;
            font-size: 8vw;
            color: #ff2e63;
        }

        #buttons {
            margin-top: 40px;
        }

        button {
            padding: 15px 40px;
            font-size: 5vw;
            border: none;
            border-radius: 12px;
            margin: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        #yes {
            background: #ff2e63;
            color: white;
        }

        #no {
            background: #888;
            color: white;
            position: relative;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }
    </style>
</head>

<body>

    <canvas id="heartCanvas"></canvas>

    <h1>宝宝可以原谅我嘛 ❤️</h1>

    <div id="buttons">
        <button id="yes">可以</button>
        <button id="no">不可以</button>
    </div>

    <script>

        // =======================
        // 爱心背景
        // =======================

        const canvas = document.getElementById("heartCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let hearts = [];

        for (let i = 0; i < 30; i++) {
            hearts.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 20 + 10,
                speed: Math.random() * 1 + 0.5
            })
        }

        function drawHeart(x, y, size) {

            ctx.fillStyle = "rgba(255,0,100,0.7)"
            ctx.beginPath()

            ctx.moveTo(x, y)

            ctx.bezierCurveTo(x - size / 2, y - size / 2, x - size, y + size / 3, x, y + size)
            ctx.bezierCurveTo(x + size, y + size / 3, x + size / 2, y - size / 2, x, y)

            ctx.fill()
        }

        function animate() {

            ctx.clearRect(0, 0, canvas.width, canvas.height)

            hearts.forEach(h => {

                drawHeart(h.x, h.y, h.size)

                h.y += h.speed

                if (h.y > canvas.height) {
                    h.y = -10
                    h.x = Math.random() * canvas.width
                }

            })

            requestAnimationFrame(animate)

        }

        animate()

        // =======================
        // 按钮逻辑
        // =======================

        let yes = document.getElementById("yes")
        let no = document.getElementById("no")

        let yesScale = 1
        let noScale = 1
        let clickCount = 0

        no.onclick = function () {

            clickCount++

            yesScale += 0.2
            noScale -= 0.1

            if (noScale < 0.3) noScale = 0.3

            yes.style.transform = "scale(" + yesScale + ")"
            no.style.transform = "scale(" + noScale + ")"

            // 按钮随机移动
            let x = Math.random() * 200 - 100
            let y = Math.random() * 200 - 100

            no.style.transform += " translate(" + x + "px," + y + "px)"

            if (clickCount == 3) {
                alert("真的不再想想吗 🥺")
            }

            if (clickCount == 5) {
                alert("我会很难过的 💔")
            }

        }

        // 点击可以
        yes.onclick = function () {

            document.body.innerHTML =
                `
    <div style="margin-top:35vh;font-size:8vw;color:#ff2e63">
    ❤️ 太好了！❤️<br>
    我就知道你会原谅我
    </div>
    `

        }

    </script>

</body>

</html>
